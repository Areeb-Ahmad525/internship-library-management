services:

  postgres:
    image: postgres:17
    container_name: library_postgres

    restart: unless-stopped

    env_file:
      - ../.env

    ports:
      - "${POSTGRES_PORT}:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - library_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cli:
    build:
      context: ..
      dockerfile: docker/cli.Dockerfile

    container_name: library_cli

    env_file:
      - ../.env

    working_dir: /app

    volumes:
      - ..:/app
    
    depends_on:
      postgres:
        condition: service_healthy
    
    stdin_open: true
    tty: true

    networks:
      - library_network

    command: tail -f /dev/null

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile

    container_name: library_fastapi

    env_file:
      - ../.env

    working_dir: /app

    volumes:
      - ..:/app

    ports:
      - "${HOST_API_PORT}:${CONTAINER_API_PORT}"

    depends_on:
      postgres:
        condition: service_healthy

    stdin_open: true
    tty: true

    networks:
      - library_network

    command: tail -f /dev/null

  frontend:
    build: 
      context: ..
      dockerfile: docker/frontend.Dockerfile

    container_name: library_frontend

    working_dir: /app

    volumes:
      - ../frontend:/app

    ports:
      - "${HOST_FRONTEND_PORT}:${CONTAINER_FRONTEND_PORT}"

    depends_on:
      - api

    stdin_open: true
    tty: true

    networks:
      - library_network

    command: tail -f /dev/null


volumes:
  postgres_data:

networks:

  library_network:
    driver: bridge